  <text x="220" y="236" fill="#00FF00" font-size="12">md</text>
  <text x="280" y="236" fill="#00FF00" font-size="12">856 B</text>
  <text x="370" y="236" fill="#AAAAAA" font-size="12">2026-03-11</text>


  <text x="669" y="218" fill="#00FF00" font-size="12">js</text>
  <text x="729" y="218" fill="#00FF00" font-size="12">3.1 KB</text>
  <text x="819" y="218" fill="#AAAAAA" font-size="12">2026-03-15</text>

  <!-- store.js -->
  <text x="463" y="236" fill="#00FF00" font-size="12">store</text>
  <text x="669" y="236" fill="#00FF00" font-size="12">js</text>
  <text x="729" y="236" fill="#00FF00" font-size="12">2.8 KB</text>
  <text x="819" y="236" fill="#AAAAAA" font-size="12">2026-03-14</text>


  <text x="14" y="514" fill="#AAAAAA" font-size="11">4 dirs  7 files  10.3 KB  2 selected</text>
  <text x="750" y="514" fill="#AAAAAA" font-size="11">OPFS  Left</text>

  <!-- F-Key Toolbar -->
  <rect x="0" y="526" width="900" height="34" fill="#000000"/>

  <!-- F1 -->
  <text x="14" y="548" fill="#FFFF55" font-size="12" font-weight="bold">1</text>
  <text x="26" y="548" fill="#FFFFFF" font-size="12">Help</text>
  <!-- F2 -->
  <text x="95" y="548" fill="#FFFF55" font-size="12" font-weight="bold">2</text>
  <text x="107" y="548" fill="#FFFFFF" font-size="12">Rename</text>
  <!-- F3 -->
  <text x="190" y="548" fill="#FFFF55" font-size="12" font-weight="bold">3</text>
  <text x="202" y="548" fill="#FFFFFF" font-size="12">View</text>
  <!-- F4 -->
  <text x="270" y="548" fill="#FFFF55" font-size="12" font-weight="bold">4</text>
  <text x="282" y="548" fill="#FFFFFF" font-size="12">Edit</text>
  <!-- F5 -->
  <text x="345" y="548" fill="#FFFF55" font-size="12" font-weight="bold">5</text>
  <text x="357" y="548" fill="#FFFFFF" font-size="12">Copy</text>
  <!-- F6 -->
  <text x="425" y="548" fill="#FFFF55" font-size="12" font-weight="bold">6</text>
  <text x="437" y="548" fill="#FFFFFF" font-size="12">Move</text>
  <!-- F7 -->
  <text x="505" y="548" fill="#FFFF55" font-size="12" font-weight="bold">7</text>
  <text x="517" y="548" fill="#FFFFFF" font-size="12">MkDir</text>
  <!-- F8 -->
  <text x="590" y="548" fill="#FFFF55" font-size="12" font-weight="bold">8</text>
  <text x="602" y="548" fill="#FFFFFF" font-size="12">Delete</text>
  <!-- F9 -->
  <text x="680" y="548" fill="#FFFF55" font-size="12" font-weight="bold">9</text>
  <text x="692" y="548" fill="#FFFFFF" font-size="12">Menu</text>
  <!-- F10 -->
  <text x="762" y="548" fill="#FFFF55" font-size="12" font-weight="bold">10</text>
  <text x="780" y="548" fill="#FFFFFF" font-size="12">Quit</text>

  <!-- Active panel indicator (left panel has brighter border) -->
  <rect x="4" y="34" width="443" height="460" fill="none" stroke="#00FFFF" stroke-width="2"/>

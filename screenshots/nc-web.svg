<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Consolas', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="#0000AA"/>

  <!-- Top Toolbar -->
  <rect x="0" y="0" width="900" height="30" fill="#000000"/>
  <text x="12" y="20" fill="#FFFFFF" font-size="13" font-weight="bold">NC Web</text>
  <text x="680" y="20" fill="#AAAAAA" font-size="12">Open Left...</text>
  <text x="790" y="20" fill="#AAAAAA" font-size="12">Open Right...</text>

  <!-- Left Panel Border -->
  <rect x="4" y="34" width="443" height="460" fill="none" stroke="#00AAAA" stroke-width="1"/>

  <!-- Left Panel Breadcrumb -->
  <rect x="5" y="35" width="441" height="22" fill="#0000AA"/>
  <text x="14" y="50" fill="#FFFF55" font-size="12" font-weight="bold">Virtual FS / projects</text>

  <!-- Left Panel Column Headers -->
  <rect x="5" y="57" width="441" height="20" fill="#00AAAA"/>
  <text x="14" y="71" fill="#000000" font-size="12" font-weight="bold">Name</text>
  <text x="220" y="71" fill="#000000" font-size="12" font-weight="bold">Ext</text>
  <text x="280" y="71" fill="#000000" font-size="12" font-weight="bold">Size</text>
  <text x="370" y="71" fill="#000000" font-size="12" font-weight="bold">Date</text>

  <!-- Left Panel File Entries -->
  <!-- .. (parent) -->
  <text x="14" y="92" fill="#FFFFFF" font-size="12">..</text>
  <text x="280" y="92" fill="#FFFFFF" font-size="12">&lt;DIR&gt;</text>

  <!-- Cursor highlight on "documents" -->
  <rect x="6" y="96" width="440" height="18" fill="#00AAAA"/>
  <text x="14" y="110" fill="#000000" font-size="12" font-weight="bold">documents</text>
  <text x="280" y="110" fill="#000000" font-size="12">&lt;DIR&gt;</text>
  <text x="370" y="110" fill="#000000" font-size="12">2026-03-15</text>

  <!-- music dir -->
  <text x="14" y="128" fill="#FFFFFF" font-size="12">music</text>
  <text x="280" y="128" fill="#FFFFFF" font-size="12">&lt;DIR&gt;</text>
  <text x="370" y="128" fill="#AAAAAA" font-size="12">2026-03-10</text>

  <!-- photos dir -->
  <text x="14" y="146" fill="#FFFFFF" font-size="12">photos</text>
  <text x="280" y="146" fill="#FFFFFF" font-size="12">&lt;DIR&gt;</text>
  <text x="370" y="146" fill="#AAAAAA" font-size="12">2026-02-28</text>

  <!-- src dir -->
  <text x="14" y="164" fill="#FFFFFF" font-size="12">src</text>
  <text x="280" y="164" fill="#FFFFFF" font-size="12">&lt;DIR&gt;</text>
  <text x="370" y="164" fill="#AAAAAA" font-size="12">2026-03-17</text>

  <!-- Selected file (yellow) -->
  <text x="14" y="182" fill="#FFFF55" font-size="12">backup</text>
  <text x="220" y="182" fill="#FFFF55" font-size="12">tar.gz</text>
  <text x="280" y="182" fill="#FFFF55" font-size="12">2.4 MB</text>
  <text x="370" y="182" fill="#FFFF55" font-size="12">2026-03-12</text>


  <rect x="454" y="35" width="441" height="22" fill="#0000AA"/>
  <text x="463" y="50" fill="#00AAAA" font-size="12">Virtual FS / projects / src</text>

  <!-- Right Panel Column Headers -->
  <rect x="454" y="57" width="441" height="20" fill="#0000AA"/>
  <text x="463" y="71" fill="#AAAAAA" font-size="12" font-weight="bold">Name</text>
  <text x="669" y="71" fill="#AAAAAA" font-size="12" font-weight="bold">Ext</text>
  <text x="729" y="71" fill="#AAAAAA" font-size="12" font-weight="bold">Size</text>
  <text x="819" y="71" fill="#AAAAAA" font-size="12" font-weight="bold">Date</text>


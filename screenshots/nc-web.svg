  <text x="463" y="182" fill="#00FF00" font-size="12">index</text>
  <text x="669" y="182" fill="#00FF00" font-size="12">ts</text>
  <text x="729" y="182" fill="#00FF00" font-size="12">1.5 KB</text>
  <text x="819" y="182" fill="#AAAAAA" font-size="12">2026-03-17</text>

